<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>베테랑 보안국 Control Center</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Malgun Gothic',sans-serif;background:#111111;color:#e6e6e6;display:flex;min-height:100vh;font-size:18px}

/* Sidebar */
.sidebar{width:400px;min-height:100vh;background:#0d0d0d;border-right:1px solid #2a2a2a;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.logo{padding:16px 16px 14px;border-bottom:1px solid #2a2a2a;text-align:center}
.logo-title{font-family:'Oswald','Impact','Arial Black',sans-serif;font-size:21px;font-weight:700;color:#C6A97A;line-height:1.35;letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap}
.logo-sub{font-size:17px;font-weight:500;color:#888;margin-top:6px;text-align:center}
.logo-motto-en{font-size:12px;font-weight:600;color:#C6A97A;letter-spacing:2.5px;text-transform:uppercase;font-style:italic;opacity:0.85;margin-top:14px}
.logo-motto-ko{font-size:11px;color:#888;letter-spacing:1.5px;font-style:italic;opacity:0.65;margin-top:3px}
/* 죄목 리스트 팝업 */
.crime-popup{position:fixed;width:260px;height:260px;min-width:160px;min-height:160px;max-width:540px;max-height:540px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:14px;z-index:500;display:none;flex-direction:column;box-shadow:0 8px 32px #000c;cursor:move;user-select:none;resize:both;overflow:hidden}
.crime-popup.visible{display:flex}
.crime-popup-title{font-size:calc(13px * var(--cps,1));font-weight:700;color:#C6A97A;text-align:center;letter-spacing:2px;text-transform:uppercase;padding-bottom:10px;border-bottom:1px solid #2a2a2a;margin-bottom:10px;flex-shrink:0}
.crime-popup-items{flex:1;overflow-y:auto;margin-bottom:10px;display:flex;flex-direction:column;gap:4px;min-height:0}
.crime-popup-item{font-size:calc(12px * var(--cps,1));color:#c8c8c8;padding:5px 9px;background:#1e1e1e;border-radius:5px;border-left:2px solid #6B4F3A;flex-shrink:0}
.crime-popup-empty{font-size:calc(12px * var(--cps,1));color:#333;text-align:center;padding:14px 0;font-style:italic}
.crime-popup-quote{border-top:1px solid #222;padding-top:10px;flex-shrink:0}
.cpq-name{font-size:calc(10px * var(--cps,1));font-weight:700;color:#C6A97A;font-style:italic;margin-bottom:4px;transition:opacity .85s}
.cpq-body{font-size:calc(10px * var(--cps,1));color:#999;font-style:italic;line-height:1.55;transition:opacity .85s}

/* 헤더 명언 */
.header-quote-area{text-align:center;overflow:hidden;padding:0 8px}
.hq-name{font-size:14px;font-weight:700;color:#C6A97A;font-style:italic;letter-spacing:0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:opacity .85s}
.hq-body{font-size:12px;color:#999;font-style:italic;line-height:1.5;transition:opacity .85s;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.nav{padding:10px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:8px;cursor:pointer;color:#888;transition:background .15s,color .15s;margin-bottom:4px;font-size:17px;font-weight:500;user-select:none}
.nav-item:hover{background:#1e1e1e;color:#e6e6e6}
.nav-item.active{background:#6B4F3A;color:#fff}

/* Main */
.main{flex:1;padding:26px 24px;overflow-y:auto}
.page{display:none}
.page.active{display:block}
.page-header{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:16px;margin-bottom:20px}
.page-title{font-size:24px;font-weight:700}
.clock{font-size:21px;color:#C6A97A;font-weight:300;letter-spacing:1px;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}

/* Cards grid */
.cards-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:16px}
.card-header{font-size:17px;font-weight:600;color:#C6A97A;margin-bottom:13px;padding-bottom:9px;border-bottom:2px solid #2a2a2a}

/* Inputs */
input[type=text]{width:100%;padding:10px 13px;background:#0d0d0d;border:1px solid #2a2a2a;border-radius:6px;color:#e6e6e6;font-size:17px;margin-bottom:8px;transition:border-color .2s;font-family:inherit}
input[type=text]:focus{outline:none;border-color:#6B4F3A}
input[type=text]::placeholder{color:#444}

/* Notice buttons */
.btn{width:100%;padding:11px 14px;border-radius:8px;cursor:pointer;font-size:17px;font-weight:500;margin-bottom:8px;border:1px solid #2a2a2a;background:#222;color:#e6e6e6;font-family:inherit;text-align:center;transition:background .15s}
.btn:last-child{margin-bottom:0}
.btn:hover{background:#2d2d2d}
.btn.yellow{color:#C6A97A}
.btn.red{color:#d97070}

/* Location buttons */
.btn-loc{width:100%;padding:11px 14px;border-radius:8px;cursor:pointer;font-size:17px;font-weight:500;margin-bottom:8px;border:1px solid #2a2a2a;background:#222;color:#aaa;font-family:inherit;text-align:center;transition:background .15s,border-color .15s,color .15s}
.btn-loc:last-child{margin-bottom:0}
.btn-loc:hover{background:#2d2d2d}

/* Flash animations */
@keyframes flash-loc{0%,35%{background:#6B4F3A;border-color:#6B4F3A;color:#fff}100%{background:#222;border-color:#2a2a2a;color:#aaa}}
@keyframes flash-bail{0%,35%{background:#6B4F3A;border-color:#6B4F3A;color:#fff}100%{background:#222;border-color:#2a2a2a;color:#aaa}}
@keyframes flash-byeoldo{0%,35%{background:#8B6B4A;border-color:#8B6B4A;color:#fff}100%{background:#222;border-color:#2a2a2a;color:#aaa}}
@keyframes flash-byeoldo-revoke{0%,35%{background:#d97070;border-color:#d97070;color:#fff}100%{background:#222;border-color:#d97070;color:#d97070}}
.btn-flash{animation:flash-loc .5s ease-out forwards}
.btn-bail-flash{animation:flash-bail .5s ease-out forwards}
.btn-byeoldo-flash{animation:flash-byeoldo .5s ease-out forwards}
.btn-byeoldo-revoke-flash{animation:flash-byeoldo-revoke .5s ease-out forwards}

/* Toast */
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-80px);background:#6B4F3A;color:#fff;padding:11px 26px;border-radius:8px;font-size:17px;font-weight:500;z-index:9999;transition:transform .3s cubic-bezier(.25,.8,.25,1);pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Fine calculator */
.fine-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding-bottom:6px}
.fine-item{display:flex;justify-content:space-between;align-items:center;padding:10px 13px;background:#1e1e1e;border:1px solid #2a2a2a;border-radius:8px;cursor:pointer;margin-bottom:6px;transition:border-color .15s,background .15s;user-select:none}
.fine-item:hover{border-color:#C6A97A;background:#222}
.fine-item.selected{background:#3a2e24;border-color:#6B4F3A}
.fine-item:last-child{margin-bottom:0}
.fine-sep{font-size:17px;font-weight:600;color:#C6A97A;margin-top:10px;margin-bottom:13px;padding-top:12px;padding-bottom:9px;border-top:2px solid #2a2a2a;border-bottom:2px solid #2a2a2a}
.fine-sep-note{font-size:17px;font-weight:400;color:#666;letter-spacing:0.5px;margin-left:8px}
.item-left{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.item-name{font-size:17px;color:#e6e6e6}
.item-tag{font-size:15px;font-weight:600;padding:1px 7px;border-radius:4px;flex-shrink:0;background:#2a2a2a;color:#C6A97A;border:1px solid #C6A97A}
.item-info{text-align:right;flex-shrink:0;margin-left:8px}
.item-amount{font-size:16px;color:#C6A97A;font-weight:600;display:block}
.item-time{font-size:15px;color:#d97070;display:block}

/* 벌금 환산기 */
.conv-body{display:flex;flex-direction:column;gap:10px}
.conv-input-row{display:flex;align-items:center;gap:14px}
.conv-input-row input{margin-bottom:0;flex:1}
.conv-arrow{font-size:22px;color:#C6A97A;flex-shrink:0}
.conv-result{font-size:20px;font-weight:700;min-width:220px;color:#888}
.conv-hint{font-size:15px;color:#555}

/* Bottom bar */
.bottom-bar{position:fixed;bottom:0;left:400px;right:0;background:#1a1a1a;border-top:2px solid #2a2a2a;padding:13px 20px;display:none;align-items:center;gap:12px;z-index:200;flex-wrap:wrap}
.bottom-bar.visible{display:flex}
.total-display{font-size:20px;font-weight:700;display:flex;align-items:center;gap:0}
.lbl{color:#888;margin-right:4px}
.val-fine{color:#C6A97A}
.val-time{color:#d97070}
.sep{color:#444;margin:0 10px}
.byeoldo-display{font-size:17px;font-weight:600;color:#C6A97A;margin-left:12px;background:#2a2a2a;padding:4px 10px;border-radius:6px;border:1px solid #C6A97A;display:none}
.bail-row{display:flex;align-items:center;gap:10px;margin-left:auto;flex-wrap:wrap}

/* Bail / action buttons */
.btn-bail{padding:10px 16px;background:#222;border:1px solid #2a2a2a;border-radius:8px;color:#aaa;cursor:pointer;font-size:16px;font-weight:500;font-family:inherit;white-space:nowrap}
.btn-bail:hover{background:#2d2d2d;color:#e6e6e6}
.btn-byeoldo{padding:10px 16px;background:#222;border:1px solid #8B6B4A;border-radius:8px;color:#C6A97A;cursor:pointer;font-size:16px;font-weight:500;font-family:inherit;white-space:nowrap}
.btn-byeoldo:hover{background:#2d2d2d}
.btn-byeoldo-revoke{padding:10px 16px;background:#222;border:1px solid #d97070;border-radius:8px;color:#d97070;cursor:pointer;font-size:16px;font-weight:500;font-family:inherit;white-space:nowrap}
.btn-byeoldo-revoke:hover{background:#2d2d2d}
.btn-reset{padding:9px 14px;background:#222;border:1px solid #2a2a2a;border-radius:6px;color:#888;cursor:pointer;font-size:16px;font-family:inherit;transition:background .15s,color .15s}
.btn-reset:hover{background:#2d2d2d;color:#e6e6e6}
.btn-copy-res{padding:11px 20px;background:#6B4F3A;border:none;border-radius:8px;color:#fff;cursor:pointer;font-size:17px;font-weight:600;font-family:inherit;transition:background .15s}
.btn-copy-res:hover{background:#7d5d46}

/* Fine page bottom padding */
#page-fine{padding-bottom:90px}

/* 우리의 다짐 슬라이드 */
.daejim-stage{position:relative;display:flex;align-items:center;justify-content:center;width:100%;overflow:hidden;min-height:calc(100vh - 220px)}
.dj-center{display:inline-flex;flex-direction:column;align-items:center;gap:20px}
.dj-frame{display:flex;justify-content:center}
#dj-slot>img,#dj-slot>video{max-height:65vh;max-width:60vw;border-radius:14px;box-shadow:0 4px 36px #000a;display:block}
@keyframes dj-fade{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
#dj-slot>*{animation:dj-fade .35s ease-out}
.daejim-caption{font-family:'Oswald','Impact',sans-serif;font-size:22px;font-weight:400;color:#e6e6e6;letter-spacing:3px;text-align:center;line-height:1.45;white-space:nowrap;padding-bottom:16px}
.dj-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.7);font-size:26px;width:42px;height:42px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,color .2s;line-height:1}
.dj-btn:hover{background:rgba(255,255,255,.18);color:#fff}
.dj-prev{left:20px}
.dj-next{right:20px}
.dj-dots{display:flex;gap:8px;justify-content:center;margin-top:8px;padding-bottom:16px}
.dj-dot{width:7px;height:7px;border-radius:50%;background:#333;transition:background .25s;cursor:pointer;user-select:none}
.dj-dot.on{background:#C6A97A}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-title">🕋 VETERAN SHERIFF's DEPARTMENT</div>
    <div class="logo-sub">베테랑 보안국</div>
    <div class="logo-motto-en">To Protect and Serve</div>
    <div class="logo-motto-ko">보호하고 봉사한다</div>
  </div>
  <nav class="nav">
    <div class="nav-item active" id="nav-notice" onclick="showPage('notice')">
      <span>📋</span> 사이드공지
    </div>
    <div class="nav-item" id="nav-fine" onclick="showPage('fine')">
      <span>💰</span> 벌금 계산기
    </div>
    <div class="nav-item" id="nav-ouri" onclick="showPage('ouri')">
      <span>🕋</span> 우리 보안국
    </div>
    <div class="nav-item" id="nav-daejim" onclick="showPage('daejim')">
      <span>🛡️</span> 우리의 다짐
    </div>
    <div class="nav-item" id="nav-crimes" onclick="toggleCrimePopup(this)">
      <span>⚖️</span> 죄목 리스트
    </div>
  </nav>
</aside>

<!-- 죄목 리스트 팝업 -->
<div class="crime-popup" id="crime-popup">
  <div class="crime-popup-title">죄목 리스트</div>
  <div class="crime-popup-items" id="crime-list-items">
    <div class="crime-popup-empty">선택된 죄목 없음</div>
  </div>
  <div class="crime-popup-quote">
    <div class="cpq-name" id="cpq-name"></div>
    <div class="cpq-body" id="cpq-body"></div>
  </div>
</div>

<!-- Main -->
<main class="main">

  <!-- 사이드공지 -->
  <section class="page active" id="page-notice">
    <div class="page-header">
      <h1 class="page-title">📋 사이드공지</h1>
      <div class="header-quote-area"><div class="hq-name"></div><div class="hq-body"></div></div>
      <div class="clock" id="clk1"></div>
    </div>

    <div class="cards-grid">
      <div class="card">
        <div class="card-header">🕋 출석 &amp; 수배</div>
        <input type="text" id="nickname" placeholder="닉네임">
        <input type="text" id="uniqueid" placeholder="고유번호">
        <input type="text" id="reason" placeholder="사유">
        <button class="btn yellow" onclick="copyAttendance()">출석 요구 복사</button>
        <button class="btn red" onclick="copyWanted()">수배 공지 복사</button>
        <button class="btn" onclick="copyWantedEnd()">수배 종료</button>
      </div>

      <div class="card">
        <div class="card-header">■ ATM 상황</div>
        <button class="btn-loc" onclick="toggleLoc(this,'중부 ATM')">중부 ATM</button>
        <button class="btn-loc" onclick="toggleLoc(this,'서부 ATM')">서부 ATM</button>
      </div>

      <div class="card">
        <div class="card-header">■ 편의점 상황</div>
        <button class="btn-loc" onclick="toggleLoc(this,'중부 편의점')">중부 편의점</button>
        <button class="btn-loc" onclick="toggleLoc(this,'서부 편의점')">서부 편의점</button>
        <button class="btn-loc" onclick="toggleLoc(this,'이케아 옆 편의점')">이케아 옆 편의점</button>
        <button class="btn-loc" onclick="toggleLoc(this,'호수 위 편의점')">호수 위 편의점</button>
        <button class="btn-loc" onclick="toggleLoc(this,'북부 편의점')">북부 편의점</button>
      </div>

      <div class="card">
        <div class="card-header">■ 중 대형 및 기타RP</div>
        <button class="btn-loc" onclick="toggleLoc(this,'북부 빈집1')">북부 빈집1</button>
        <button class="btn-loc" onclick="toggleLoc(this,'북부 빈집2')">북부 빈집2</button>
        <button class="btn-loc" onclick="toggleLoc(this,'닭공장')">닭공장</button>
        <button class="btn-loc" onclick="toggleLoc(this,'북부은행')">북부은행</button>
        <button class="btn-loc" onclick="toggleLoc(this,'북부저택')">북부저택</button>
      </div>

      <div class="card">
        <div class="card-header">■ 남부 진입</div>
        <button class="btn-loc" onclick="toggleLoc(this,'남부 진입')">수배 남부 진입</button>
        <button class="btn-loc" onclick="toggleLoc(this,'물품 구매 남부 진입')">물품 구매 요청</button>
      </div>

      <div class="card">
        <div class="card-header">■ 헬기 이륙</div>
        <button class="btn-loc" onclick="toggleLoc(this,'헬기 순찰')">헬기 순찰</button>
        <button class="btn-loc" onclick="toggleLoc(this,'헬기 면접')">헬기 면접</button>
        <button class="btn-loc" onclick="toggleLoc(this,'헬기 수배')">헬기 수배</button>
      </div>
    </div>
  </section>

  <!-- 벌금 계산기 -->
  <section class="page" id="page-fine">
    <div class="page-header">
      <h1 class="page-title">💰 벌금 계산기</h1>
      <div class="header-quote-area"><div class="hq-name"></div><div class="hq-body"></div></div>
      <div class="clock" id="clk2"></div>
    </div>

    <div class="fine-grid" id="fine-grid"></div>
  </section>

  <!-- 우리의 다짐 -->
  <section class="page" id="page-daejim">
    <div class="page-header">
      <h1 class="page-title">🛡️ 우리의 다짐</h1>
      <div class="header-quote-area"><div class="hq-name"></div><div class="hq-body"></div></div>
      <div class="clock" id="clk4"></div>
    </div>
    <div class="daejim-stage">
      <button class="dj-btn dj-prev" onclick="djMove(-1)">&#8249;</button>
      <div class="dj-center">
        <div class="dj-frame">
          <div id="dj-slot"></div>
        </div>
        <div class="daejim-caption" id="dj-cap"></div>
      </div>
      <button class="dj-btn dj-next" onclick="djMove(1)">&#8250;</button>
    </div>
    <div class="dj-dots" id="dj-dots"></div>
  </section>

  <!-- 우리 보안국 -->
  <section class="page" id="page-ouri">
    <div class="page-header">
      <h1 class="page-title">🕋 우리 보안국</h1>
      <div class="header-quote-area"><div class="hq-name"></div><div class="hq-body"></div></div>
      <div class="clock" id="clk3"></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 160px);gap:24px">
      <img src="sheriff.png" alt="우리 보안국" style="max-width:80%;max-height:65vh;border-radius:14px;object-fit:contain;box-shadow:0 4px 32px #0008">
      <div style="font-size:22px;color:#888;font-style:italic;letter-spacing:1px">힘들지? 타고 가~</div>
    </div>
  </section>

</main>

<!-- Bottom bar -->
<div class="bottom-bar" id="bottom-bar">
  <div class="total-display">
    <span class="lbl">벌금</span><span class="val-fine" id="disp-fine">0원</span>
    <span class="sep">|</span>
    <span class="lbl">구금</span><span class="val-time" id="disp-time">0분</span>
    <span class="byeoldo-display" id="byeoldo-display"></span>
  </div>
  <div class="bail-row">
    <button class="btn-byeoldo" id="bail-byeoldo" onclick="addByeoldo()">별도 보석금</button>
    <button class="btn-byeoldo" id="bail-byeoldo10" onclick="addByeoldo10()">별도 보석금x10</button>
    <button class="btn-byeoldo-revoke" id="bail-byeoldo-revoke" onclick="removeByeoldo()">별도 보석금 철회</button>
    <button class="btn-bail" id="bail-normal" onclick="setBail('normal')">일반 보석금</button>
    <button class="btn-bail" id="bail-large" onclick="setBail('large')">대형 보석금</button>
    <button class="btn-reset" onclick="resetFines()">초기화</button>
    <button class="btn-copy-res" onclick="copyFineResult()">내역 복사</button>
  </div>
</div>

<script>
// Clock
const DAYS=['일','월','화','수','목','금','토'];
function pad(n){return String(n).padStart(2,'0')}
function tick(){
  const n=new Date();
  const date=`${n.getFullYear()}년 ${pad(n.getMonth()+1)}월 ${pad(n.getDate())}일 ${DAYS[n.getDay()]}요일`;

// Copy
async function copyText(text){
  try{await navigator.clipboard.writeText(text)}
  catch{const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta)}
  toast('복사되었습니다! 🕋');
}

const BAIL_RATE={normal:50_000_000, large:50_000_000};
let bailMode='none';
let byeoldoCount=0;

function setBail(mode){
  bailMode=(bailMode===mode)?'none':mode;
  byeoldoCount=0;
  flashBtn(document.getElementById('bail-'+mode),'btn-bail-flash');
  updateTotals();
}

function fmt(n){return n.toLocaleString('ko-KR')+'원'}

// 대형 보석금: large 항목은 최소 10분 구금 유지
function applyBail(fine,time,largeTime){
  if(bailMode==='none') return{df:fine,dt:time};
  const normalTime=time-largeTime;
  if(bailMode==='normal'){
    const chunks=Math.floor(time/10);
    return{df:fine+chunks*BAIL_RATE.normal, dt:time%10};
  }
  const normalChunks=Math.floor(normalTime/10);
  const remainNormal=normalTime%10;
  const largeChunks=largeTime>10?Math.floor((largeTime-10)/10):0;
  const remainLarge=largeTime>0?largeTime-largeChunks*10:0;
  return{
    df:fine+(normalChunks+largeChunks)*BAIL_RATE.large,
    dt:remainNormal+remainLarge
  };
}

// 별도 보석금: 구금 1분 차감 & 벌금 5,000,000 추가
function addByeoldo(){
  const{fine,time,largeTime}=getRaw();
  const{dt}=applyBail(fine,time,largeTime);
  const remaining=dt-byeoldoCount;
  if(remaining<=0){
    toast('더 이상 별도 보석금 추가 불가');
    return;
  }
  byeoldoCount++;
  flashBtn(document.getElementById('bail-byeoldo'),'btn-byeoldo-flash');
  updateTotals();
}

      if(item.sep){

function getRaw(){
  let fine=0,time=0,largeTime=0;
  document.querySelectorAll('.fine-item.selected').forEach(el=>{
    fine+=+el.dataset.a; time+=+el.dataset.t;
    if(el.dataset.large==='true') largeTime+=+el.dataset.t;
  });
  return{fine,time,largeTime};
}

// 최종 값 계산 (bail + 별도 보석금 모두 적용)
function getFinal(){
  const{fine,time,largeTime}=getRaw();
  const{df,dt}=applyBail(fine,time,largeTime);
  return{
    finalFine: df + byeoldoCount*5_000_000,
    finalTime: Math.max(0, dt-byeoldoCount)
  };
}

function updateTotals(){
  const{finalFine,finalTime}=getFinal();
  document.getElementById('disp-fine').textContent=fmt(finalFine);
  document.getElementById('disp-time').textContent=finalTime+'분';

  const bd=document.getElementById('byeoldo-display');
  if(byeoldoCount>0){
    bd.style.display='inline-block';
    bd.textContent=`[별도 보석금] ${byeoldoCount}회`;
  } else {
    bd.style.display='none';
  }
  updateCrimeList();
}

function updateCrimeList(){
  const container=document.getElementById('crime-list-items');
  if(!container) return;
  const sel=document.querySelectorAll('.fine-item.selected');
  container.innerHTML='';
  if(!sel.length){
    container.innerHTML='<div class="crime-popup-empty">선택된 죄목 없음</div>';
    return;
  }
  sel.forEach(el=>{
    const div=document.createElement('div');
    div.className='crime-popup-item';
    div.textContent=el.dataset.n;
    container.appendChild(div);
  });
}

}

// 벌금 환산기
function calcConverter(){
  const inp=document.getElementById('conv-input');
  const raw=inp.value.replace(/[^0-9]/g,'');
  const el=document.getElementById('conv-result');
  if(!raw){inp.value='';el.innerHTML='-';el.style.color='#888';return}
  const amount=parseInt(raw);
  // 커서 위치 유지하며 콤마 포맷
  inp.value=amount.toLocaleString('ko-KR');
  const mins=Math.floor(amount/5_000_000);
  if(mins<1){
    el.textContent='최소 1분 미만 — 계산 불가';
    el.style.color='#d97070';
  } else if(mins>120){
    el.textContent='120분 이상 계산 불가 (최대 120분)';
    el.style.color='#d97070';
  } else {
    el.innerHTML=`<span style="color:#888">구금</span> <span style="color:#d97070">${mins}분</span>`;
    el.style.color='';
  }
}

// 우리의 다짐 슬라이드
const DJ_DATA=[
  {src:'sheriff1.png',      t:'img',   cap:'"보이지 않는 방패, 흔들리지 않는 신념"'},
  {src:'sheriff2.png',      t:'img',   cap:'"위험은 숨을 수 있어도 우리는 멈추지 않는다."'},
  {src:'sheriff3.png',      t:'img',   cap:'"한 발 먼저, 한 치 빈틈 없이."'},
  {src:'sheriff4.png',      t:'img',   cap:'"국가의 안전, 우리의 사명."'},
  {src:'sheriff5.png',      t:'img',   cap:'"어둠 속에서도 국민은 안전해야 한다."'},
  {src:'sheriff-chase.mp4', t:'video', cap:'"끝까지 추적하고, 끝까지 보호한다."'},
];
let _djIdx=0;
DJ_DATA.forEach((_,i)=>{
  const d=document.createElement('div');
  d.className='dj-dot'+(i===0?' on':'');
  d.onclick=()=>djGo(i);
  document.getElementById('dj-dots').appendChild(d);
});
function djGo(idx){
  document.getElementById('dj-slot').querySelectorAll('video').forEach(v=>{v.pause();v.currentTime=0;});
  _djIdx=idx;
  const d=DJ_DATA[idx];
  const slot=document.getElementById('dj-slot');
  if(d.t==='img'){
    slot.innerHTML=`<img src="${d.src}">`;
  } else {
    slot.innerHTML=`<video muted loop playsinline><source src="${d.src}" type="video/mp4"></video>`;
    slot.querySelector('video').play().catch(()=>{});
  }
  document.getElementById('dj-cap').innerHTML=d.cap;
  document.querySelectorAll('.dj-dot').forEach((el,i)=>el.classList.toggle('on',i===_djIdx));
}
function djMove(dir){djGo((_djIdx+dir+DJ_DATA.length)%DJ_DATA.length);}
djGo(0);

// ── 죄목 리스트 팝업 ──
const QUOTES=[
  {name:'"죄에 상응하는 가장 무거운 대가"', body:'범죄의 고의성과 심각성에 비례하여 법이 허용하는 최고형을 구형하고 집행해야 한다는 응보주의 원칙입니다.'},
  {name:'"사회와 범죄자의 완전한 격리"',    body:'강력 범죄자나 상습 재범자를 사회로부터 장기간 분리하여 일반 시민의 생명과 신체의 안전을 보장하는 것을 목적으로 합니다.'},
  {name:'"무관용 원칙"',                    body:'아주 사소한 위법 행위나 범죄라도 예외 없이 강력하게 처벌함으로써, 범죄 발생 자체를 미연에 방지하고자 하는 기조입니다.'},
];
let _qIdx=Math.floor(Math.random()*QUOTES.length);
let _qTimer=null;

function _allQuoteEls(){
  return[
    ...document.querySelectorAll('.hq-name,.hq-body'),
    document.getElementById('cpq-name'),
    document.getElementById('cpq-body')
  ].filter(Boolean);
}
function _applyQuoteText(idx){
  document.querySelectorAll('.hq-name').forEach(el=>el.textContent=QUOTES[idx].name);
  document.querySelectorAll('.hq-body').forEach(el=>el.textContent=QUOTES[idx].body);
  const n=document.getElementById('cpq-name');
  const b=document.getElementById('cpq-body');
  if(n) n.textContent=QUOTES[idx].name;
  if(b) b.textContent=QUOTES[idx].body;
}
function _setQuote(idx,fade){
  if(fade){
    _allQuoteEls().forEach(el=>el.style.opacity='0');
    setTimeout(()=>{
      _applyQuoteText(idx);
      _allQuoteEls().forEach(el=>el.style.opacity='1');
      setTimeout(_scheduleQuote,900);
    },900);
  } else {
    _applyQuoteText(idx);
    _allQuoteEls().forEach(el=>el.style.opacity='1');
    _scheduleQuote();
  }
}
function _scheduleQuote(){
  clearTimeout(_qTimer);
  _qTimer=setTimeout(()=>{
    _qIdx=(_qIdx+1)%QUOTES.length;
    _setQuote(_qIdx,true);
  },10000);
}
_setQuote(_qIdx,false);

// 팝업 토글
function toggleCrimePopup(btn){
  const popup=document.getElementById('crime-popup');
  if(popup.classList.contains('visible')){
    popup.classList.remove('visible');
    document.getElementById('nav-crimes').classList.remove('active');
    return;
  }
  const rect=btn.getBoundingClientRect();
  const top=Math.min(rect.top, window.innerHeight-270);
  popup.style.left=(rect.right+10)+'px';
  popup.style.top=Math.max(8,top)+'px';
  popup.classList.add('visible');
  document.getElementById('nav-crimes').classList.add('active');
}

// 팝업 텍스트 스케일 (ResizeObserver)
const _popup=document.getElementById('crime-popup');
new ResizeObserver(entries=>{
  const w=entries[0].contentRect.width;
  entries[0].target.style.setProperty('--cps',(w/260).toFixed(3));
}).observe(_popup);

// 드래그 (resize 핸들 영역 제외)
let _drag=null;
_popup.addEventListener('mousedown',e=>{
  const r=_popup.getBoundingClientRect();
  // resize 핸들 영역(우하단 20px) 제외
  if(e.clientX>r.right-20 && e.clientY>r.bottom-20) return;
  _drag={ox:e.clientX-r.left, oy:e.clientY-r.top};
  e.preventDefault();
});
document.addEventListener('mousemove',e=>{
  if(!_drag) return;
  _popup.style.left=(e.clientX-_drag.ox)+'px';
  _popup.style.top=(e.clientY-_drag.oy)+'px';
});
document.addEventListener('mouseup',()=>{ _drag=null; });
</script>
